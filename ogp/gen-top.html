<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OGP Generator — チェッカーシリーズ TOP</title>
<style>
body { background:#222; display:flex; flex-direction:column; align-items:center; padding:32px; font-family:sans-serif; }
canvas { border:1px solid #444; display:block; }
button { margin-top:16px; padding:12px 32px; background:#4DE8E0; color:#07070e; border:none; border-radius:8px; font-size:16px; font-weight:900; cursor:pointer; }
p { color:#999; font-size:13px; margin-top:8px; }
</style>
</head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<button onclick="dl()">⬇ top-ogp.png をダウンロード</button>
<p>保存したら strataix-checkers/ogp/ フォルダに格納してください</p>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = 1200, H = 630;

// 背景
const bg = ctx.createLinearGradient(0,0,W,H);
bg.addColorStop(0,'#07070e'); bg.addColorStop(1,'#0d1220');
ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

// グリッド
ctx.strokeStyle='rgba(77,232,224,0.05)'; ctx.lineWidth=1;
for(let x=0;x<W;x+=48){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
for(let y=0;y<H;y+=48){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

// グロー（中央上）
const glow=ctx.createRadialGradient(W/2,160,0,W/2,160,480);
glow.addColorStop(0,'rgba(77,232,224,0.12)'); glow.addColorStop(1,'rgba(77,232,224,0)');
ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);

// 上部アクセントライン
const topLine=ctx.createLinearGradient(0,0,W,0);
topLine.addColorStop(0,'rgba(77,232,224,0)');
topLine.addColorStop(0.2,'#4DE8E0');
topLine.addColorStop(0.5,'#9060ff');
topLine.addColorStop(0.8,'#ff6eb4');
topLine.addColorStop(1,'rgba(255,110,180,0)');
ctx.fillStyle=topLine; ctx.fillRect(0,0,W,5);

// バッジ
ctx.fillStyle='rgba(77,232,224,0.1)';
roundRectFill(ctx,72,56,200,34,17);
ctx.strokeStyle='rgba(77,232,224,0.35)'; ctx.lineWidth=1;
roundRectStroke(ctx,72,56,200,34,17);
ctx.font='700 14px sans-serif'; ctx.fillStyle='#4DE8E0';
ctx.textAlign='left'; ctx.fillText('STRATAIX CHECKERS', 90, 78);

// メインタイトル
ctx.font='900 66px sans-serif';
const tg=ctx.createLinearGradient(72,0,W-72,0);
tg.addColorStop(0,'#4DE8E0'); tg.addColorStop(0.5,'#9060ff'); tg.addColorStop(1,'#ff6eb4');
ctx.fillStyle=tg; ctx.textAlign='left';
ctx.fillText('自分を知る、診断シリーズ', 72, 188);

// サブタイトル
ctx.font='500 26px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.6)';
ctx.fillText('無料・登録不要。12問でタイプが分かる。', 72, 244);

// 区切り線
ctx.strokeStyle='rgba(77,232,224,0.15)'; ctx.lineWidth=1;
ctx.beginPath(); ctx.moveTo(72,278); ctx.lineTo(W-72,278); ctx.stroke();

// チェッカーカード 3つ
const checkers = [
  {
    color: '#4DE8E0',
    label: 'AI WORK',
    title: 'AIワーク\n相性チェッカー',
    icon: '🚀',
    sub: '16タイプ診断'
  },
  {
    color: '#e03a90',
    label: 'POPULAR',
    title: '好かれ度\nチェッカー',
    icon: '💖',
    sub: '5タイプ診断'
  },
  {
    color: '#3dd4aa',
    label: 'WORKPLACE',
    title: '職場適性\nチェッカー',
    icon: '🏢',
    sub: '5タイプ診断'
  },
];

checkers.forEach((c,i) => {
  const x = 72 + i * 356;
  const y = 304;
  const w = 326, h = 200;

  // カード背景
  ctx.fillStyle=`rgba(${hexToRgb(c.color)},0.07)`;
  roundRectFill(ctx,x,y,w,h,16);
  ctx.strokeStyle=`rgba(${hexToRgb(c.color)},0.3)`; ctx.lineWidth=1;
  roundRectStroke(ctx,x,y,w,h,16);

  // ラベルバッジ
  ctx.fillStyle=`rgba(${hexToRgb(c.color)},0.15)`;
  roundRectFill(ctx,x+16,y+16,80,22,11);
  ctx.font='700 11px sans-serif'; ctx.fillStyle=c.color; ctx.textAlign='left';
  ctx.fillText(c.label, x+26, y+31);

  // アイコン
  ctx.font='40px serif'; ctx.textAlign='left';
  ctx.fillText(c.icon, x+16, y+100);

  // タイトル（2行対応）
  ctx.font='700 22px sans-serif'; ctx.fillStyle='#ffffff';
  const lines = c.title.split('\n');
  lines.forEach((l,li) => ctx.fillText(l, x+16, y+130 + li*30));

  // サブ
  ctx.font='500 14px sans-serif'; ctx.fillStyle=c.color;
  ctx.fillText(c.sub, x+16, y+178);
});

// 下部 URL
ctx.font='700 20px sans-serif'; ctx.fillStyle='rgba(77,232,224,0.5)';
ctx.textAlign='left'; ctx.fillText('無料・登録不要 · 全チェッカー公開中', 72, H-44);
ctx.font='500 18px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.2)';
ctx.textAlign='right'; ctx.fillText('checker.strataix.net', W-72, H-44);
ctx.font='700 18px sans-serif'; ctx.fillStyle='rgba(77,232,224,0.3)';
ctx.fillText('Sinc by StratAIX', W-72, H-72);

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
function roundRectFill(ctx,x,y,w,h,r){roundRect(ctx,x,y,w,h,r);ctx.fill();}
function roundRectStroke(ctx,x,y,w,h,r){roundRect(ctx,x,y,w,h,r);ctx.stroke();}

function dl(){
  const a=document.createElement('a');
  a.download='top-ogp.png';
  a.href=cv.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
